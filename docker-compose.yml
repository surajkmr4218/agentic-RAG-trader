name: alphagen

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: alphagen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d alphagen"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    env_file: .env
    # Override the DB host: inside the network the database is `db`, not localhost.
    # `environment` wins over env_file, so this replaces the .env DATABASE_URL.
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/alphagen
    ports:
      - "8000:8000"
    # Bind-mount source for --reload. The runtime venv lives at /opt/venv (see
    # Dockerfile), so this mount does NOT shadow it with the host .venv.
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: